name: Historical Backfill

on:
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Maximum pages to process (leave blank for all)"
        required: false
        default: ""

      reset_checkpoint:
        description: "Reset checkpoint before running"
        required: true
        default: false
        type: boolean

jobs:
  backfill:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Historical Backfill
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          CMD="python -m tirumala_pulse.main backfill"

          if [ "${{ github.event.inputs.reset_checkpoint }}" = "true" ]; then
            CMD="$CMD --reset"
          fi

          if [ -n "${{ github.event.inputs.max_pages }}" ]; then
            CMD="$CMD --max-pages ${{ github.event.inputs.max_pages }}"
          fi

          echo "Running: $CMD"

          eval "$CMD"